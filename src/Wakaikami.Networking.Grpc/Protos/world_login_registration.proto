syntax = "proto3";

package wakaikami.grpc.world_login_registration;

import "google/protobuf/empty.proto";

option csharp_namespace = "Wakaikami.Networking.Grpc.Messages.WorldLoginRegistration";

service WorldLoginRegistration {
  rpc RegisterWorld(RegisterWorldRequest) returns (RegisterWorldReply);
  rpc WorldSync(WorldSyncRequest) returns (google.protobuf.Empty);
}

message RegisterWorldRequest {
  int32 world_id = 1;
  string world_name = 2;
  string connect_ip = 3;
  int32 connect_port = 4;
  bool is_test_server = 5;
}

message RegisterWorldReply {
  bool accepted = 1;
}

message WorldSyncRequest {
  int32 world_id = 1;
  int32 state = 2;
}
